<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 256 256" role="img" aria-label="Avatar iXJd8YJzUx">
  <defs>
    <linearGradient id="bg" gradientTransform="rotate(108 128 128)">
