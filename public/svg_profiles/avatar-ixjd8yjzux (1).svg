        <ellipse cx="134" cy="159" rx="8.6" ry="4" fill="rgba(255,150,150,0.6)"/>
      
      
      <!-- Accessories -->
      
    </g>
    
    <!-- Headwear in front -->
    
        <ellipse cx="116" cy="79" rx="14" ry="10" fill="#feca57" opacity="0.7"/>
