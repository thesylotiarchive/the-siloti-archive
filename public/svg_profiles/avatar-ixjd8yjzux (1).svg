    <rect x="16" y="16" width="224" height="224" rx="56" filter="url(#grain)" opacity="0.7"/>

    <!-- Headwear behind face -->
    

    <!-- Face -->
    <g filter="url(#softShadow)">
      <circle cx="134" cy="141" r="57" fill="rgba(255,255,255,0.55)"/>
      
      <!-- Eyebrows -->
      
        <path d="M 105.5 110 L 119.5 110" stroke="rgba(17,24,39,0.65)" stroke-width="5" stroke-linecap="round"/>
        <path d="M 148.5 110 L 162.5 110" stroke="rgba(17,24,39,0.65)" stroke-width="5" stroke-linecap="round"/>
      
      
      <!-- Eyes -->
      
        <circle cx="112.5" cy="125" r="7" fill="rgba(17,24,39,0.78)"/>
        <circle cx="155.5" cy="125" r="7" fill="rgba(17,24,39,0.78)"/>
