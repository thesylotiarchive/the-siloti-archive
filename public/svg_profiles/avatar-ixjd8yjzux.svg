    <circle cx="170.5" cy="191.5" r="48.5" fill="#ff9a9e" opacity="0.17050461848732085"/>
    <rect x="147" y="71" width="76" height="76" rx="28" fill="#fad0c4" opacity="0.259471500730142" transform="rotate(128 185 109)"/>
    <rect x="16" y="16" width="224" height="224" rx="56" filter="url(#grain)" opacity="0.7"/>

    <!-- Headwear behind face -->
    

