<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 256 256" role="img" aria-label="Avatar gMPCRNHLbo">
  <defs>
    <linearGradient id="bg" gradientTransform="rotate(283 128 128)">
      <stop offset="0" stop-color="#6b7280"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="5968" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12" />
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.2)" />
    </filter>
    <clipPath id="clip">
      <rect x="16" y="16" width="224" height="224" rx="56" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>
    <rect x="51" y="146" width="104" height="104" rx="44" fill="#6b7280" opacity="0.2212249535601586" transform="rotate(180 103 198)"/>
    <rect x="77" y="55" width="112" height="112" rx="28" fill="#374151" opacity="0.2989031238295138" transform="rotate(331 133 111)"/>
    <circle cx="103" cy="46" r="25" fill="#374151" opacity="0.15031646334100515"/>
    <circle cx="116" cy="152" r="55" fill="#374151" opacity="0.15582450001500547"/>
    <circle cx="60" cy="127" r="22" fill="#e5e7eb" opacity="0.14110003688838332"/>
    <circle cx="139" cy="159" r="45" fill="#9ca3af" opacity="0.21074629605282097"/>
    <rect x="16" y="16" width="224" height="224" rx="56" filter="url(#grain)" opacity="0.7"/>

    <!-- Headwear behind face -->
    

    <!-- Face -->
    <g filter="url(#softShadow)">
      <circle cx="122" cy="138" r="55" fill="rgba(255,255,255,0.55)"/>
      
      <!-- Eyebrows -->
      
        <path d="M 96.5 107 L 112.5 107" stroke="rgba(17,24,39,0.5)" stroke-width="3" stroke-linecap="round"/>
        <path d="M 131.5 107 L 147.5 107" stroke="rgba(17,24,39,0.5)" stroke-width="3" stroke-linecap="round"/>
      
      
      <!-- Eyes -->
      
        <circle cx="104.5" cy="122" r="8.8" fill="rgba(17,24,39,0.78)"/>
        <circle cx="139.5" cy="122" r="8.8" fill="rgba(17,24,39,0.78)"/>
        <circle cx="105.5" cy="120" r="4" fill="rgba(255,255,255,0.8)"/>
        <circle cx="140.5" cy="120" r="4" fill="rgba(255,255,255,0.8)"/>
        <circle cx="102.5" cy="124" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="137.5" cy="124" r="2" fill="rgba(255,255,255,0.6)"/>
      
      
      <!-- Mouth -->
      <path d="M 101 152 L 143 152" stroke="rgba(17,24,39,0.65)" stroke-width="5" stroke-linecap="round"/>
      
      <!-- Accessories -->
      
        <circle cx="104.5" cy="122" r="14" fill="none" stroke="rgba(17,24,39,0.4)" stroke-width="2.5"/>
        <circle cx="139.5" cy="122" r="14" fill="none" stroke="rgba(17,24,39,0.4)" stroke-width="2.5"/>
        <path d="M 118.5 122 L 125.5 122" stroke="rgba(17,24,39,0.4)" stroke-width="2"/>
