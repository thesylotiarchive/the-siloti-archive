        <path d="M 153.5 122 L 161.5 116" stroke="rgba(17,24,39,0.4)" stroke-width="2"/>
      
    </g>
    
    <!-- Headwear in front -->
    
        <ellipse cx="104" cy="78" rx="14" ry="10" fill="#e5e7eb" opacity="0.7"/>
        <ellipse cx="140" cy="78" rx="14" ry="10" fill="#e5e7eb" opacity="0.7"/>
        <circle cx="122" cy="80" r="8" fill="#e5e7eb" opacity="0.85"/>
      
