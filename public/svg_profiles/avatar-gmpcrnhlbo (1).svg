<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 256 256" role="img" aria-label="Avatar gMPCRNHLbo">
  <defs>
    <linearGradient id="bg" gradientTransform="rotate(171 128 128)">
      <stop offset="0" stop-color="#ffc371"/>
      <stop offset="1" stop-color="#fad0c4"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="3827" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12" />
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.2)" />
    </filter>
    <clipPath id="clip">
      <rect x="16" y="16" width="224" height="224" rx="56" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>
    <circle cx="96" cy="109" r="69" fill="#fbc2eb" opacity="0.25513125707395373"/>
    <circle cx="87" cy="127" r="65" fill="#fbc2eb" opacity="0.22470351330004631"/>
    <rect x="98" y="37" width="126" height="126" rx="39" fill="#ff9a9e" opacity="0.16963386092334987" transform="rotate(158 161 100)"/>
    <rect x="76" y="30" width="86" height="86" rx="43" fill="#ff9a9e" opacity="0.2680596210435033" transform="rotate(29 119 73)"/>
    <circle cx="90" cy="196" r="23" fill="#ff5f6d" opacity="0.13711779419798403"/>
    <rect x="92" y="21" width="110" height="110" rx="38" fill="#ffc371" opacity="0.2570607333863154" transform="rotate(178 147 76)"/>
    <rect x="16" y="16" width="224" height="224" rx="56" filter="url(#grain)" opacity="0.7"/>

    <!-- Headwear behind face -->
    

    <!-- Face -->
    <g filter="url(#softShadow)">
      <circle cx="125" cy="131" r="53" fill="rgba(255,255,255,0.55)"/>
      
      <!-- Eyebrows -->
      
        <path d="M 100 103 Q 109 96 118 103" fill="none" stroke="rgba(17,24,39,0.5)" stroke-width="3" stroke-linecap="round"/>
        <path d="M 132 103 Q 141 96 150 103" fill="none" stroke="rgba(17,24,39,0.5)" stroke-width="3" stroke-linecap="round"/>
      
      
      <!-- Eyes -->
      
        <ellipse cx="109" cy="117" rx="5.6" ry="8" fill="rgba(17,24,39,0.78)"/>
        <ellipse cx="141" cy="117" rx="5.6" ry="8" fill="rgba(17,24,39,0.78)"/>
      
      
      <!-- Mouth -->
      <path d="M 108.2 151 Q 125 149 141.8 143" fill="none" stroke="rgba(17,24,39,0.7)" stroke-width="5" stroke-linecap="round"/>
      
      <!-- Accessories -->
      
    </g>
    
    <!-- Headwear in front -->
    
        <path d="M 110 78 Q 105 48 115 38" fill="none" stroke="rgba(17,24,39,0.4)" stroke-width="3"/>
        <circle cx="115" cy="35" r="6" fill="#fbc2eb" opacity="0.8"/>
        <path d="M 140 78 Q 145 48 135 38" fill="none" stroke="rgba(17,24,39,0.4)" stroke-width="3"/>
        <circle cx="135" cy="35" r="6" fill="#fbc2eb" opacity="0.8"/>
      
